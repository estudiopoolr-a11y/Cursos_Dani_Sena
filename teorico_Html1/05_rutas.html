<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas</title>
</head>
<body style="background-color: rgb(151, 151, 255);">
    <h1>Explicación: Rutas Absolutas y Relativas</h1>
    <section>
        <h2>Rutas Absolutas</h2>
        <!-- Rutas que especifican la ubicación completa de un recurso, comenzando desde la raíz del servidor. -->
         <p>para ir a un sitio externo ,como catalogo global de repuestos,usamos la URL completa
            <a href="https://www.shimano.com">Catalogo Shimano</a>
         </p>

         <img src="https://www.tooltyp.com/wp-content/uploads/2014/10/1900x920-8-beneficios-de-usar-imagenes-en-nuestros-sitios-web.jpg" alt="Imagen HTML desde un servidor externo" width="300" height="200" title="HTML 5">
    </section>

    <hr>

    <section>
        <h2>Rutas Relativas</h2>
        <!-- Rutas que especifican la ubicación de un recurso en relación con la ubicación actual del documento. -->
        <p>
            ir a la pagina de <a href="/04_inline_inblock.html">inline y block</a>
        </p>

        <p>
            ver foto de <a href="04_imagen.jpg">Imagen</a>
        </p>
    </section>
</body>
</html>
