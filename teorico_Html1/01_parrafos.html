    <!-- Títulos o encabezados
     se tienen 6 tipos de encabezados , desde el h1 hasta el h6  -->
     <!-- (h$*6) Crea 6 títulos en orden del 1 al 6 Emmett  -->
      <h1>Títulos</h1>
      <!-- El h1 se utiliza para el título principal del documento y una sola vez porque el SEO de Google lo recomienda -->
      <h2>Subtitulo 1</h2>
      <h3>Subtitulo 2</h3>
      <h4>Subtitulo 3</h4>
      <h5>Subtitulo 4</h5>
      <h6>Subtitulo 5</h6>
      <!-- desde el h2 hasta el h6, se pueden utilizar las veces que se necesite -->

      <!-- Párrafo: Los párrafos se utilizan para crear bloques de texto -->
      <p>Lorem ipsum dolor sit a met connecter adipescent elite. Porro a liquid mayors debits fuga commode modo dolorous. Volpato peruviana, a representer Deseronto kumquat illo quidded tempore acoasms ani mum quia cum sunt?</p>
      <!-- (Alt-z) Ajusta el texto -->
</body>
